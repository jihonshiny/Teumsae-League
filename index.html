<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>틈새리그 배드민턴 리그 대진표</title>
    <link rel="stylesheet" href="./styles.css?v=20260529-mode" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title-wrap">
          <textarea
            id="titleInput"
            class="title-input"
            placeholder="대회 제목 입력"
            aria-label="대회 제목"
            rows="1"
          ></textarea>
        </div>
        <div class="actions">
          <div class="mode-toggle" aria-label="경기 방식 선택">
            <button class="mode-btn" type="button" data-mode="team">단체전</button>
            <button class="mode-btn" type="button" data-mode="individual">개인전</button>
          </div>
          <label class="court-control">
            <span>코트 수</span>
            <input id="courtCountInput" type="number" min="2" max="30" value="6" />
          </label>
          <button id="clearScoresBtn" type="button">점수 비우기</button>
          <button id="printBtn" type="button">인쇄/PDF</button>
          <button id="resetBtn" type="button">초기화</button>
        </div>
      </header>

      <section class="league-board" aria-label="배드민턴 리그 대진표">
        <div class="section-title">
          <span>대진표</span>
          <small>복식 3세트 경기 기록</small>
        </div>
        <div class="board-head">
          <div class="head-cell side-head">구분</div>
        </div>
        <div id="matchList"></div>
        <div class="board-actions">
          <button id="addMatchBtn" type="button">+ 경기 추가</button>
          <button id="removeMatchBtn" type="button">- 마지막 경기 삭제</button>
        </div>
      </section>

    <section class="result-section" aria-label="경기 결과">
        <h2><span></span>경기결과<span></span></h2>
        <table class="result-table">
        <thead>
          <tr>
            <th>순위</th>
            <th id="nameColumnHead">학교명</th>
            <th>결과</th>
            <th>세트 점수</th>
          </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </section>
    </main>

    <template id="matchTemplate">
      <section class="match">
        <div class="match-title"></div>
      </section>
    </template>

    <template id="fixtureTemplate">
      <div class="fixture">
        <div class="fixture-teams">
          <label class="team-slot">
            <input
              class="school school-a"
              data-field="schoolA"
              placeholder="학교명"
            />
            <span class="record record-a">( )</span>
          </label>
          <strong>vs</strong>
          <label class="team-slot">
            <input
              class="school school-b"
              data-field="schoolB"
              placeholder="학교명"
            />
            <span class="record record-b">( )</span>
          </label>
        </div>
        <div class="set-list"></div>
      </div>
    </template>

    <template id="setTemplate">
      <div class="set-row">
        <div class="set-number"></div>
        <div class="player-cell" data-side="A"></div>
        <div class="scores">
          <input
            class="score score-a"
            data-field="scoreA"
            type="number"
            min="0"
            inputmode="numeric"
          />
          <span>:</span>
          <input
            class="score score-b"
            data-field="scoreB"
            type="number"
            min="0"
            inputmode="numeric"
          />
        </div>
        <div class="player-cell" data-side="B"></div>
      </div>
    </template>

    <script src="./script.js?v=20260529-mode"></script>
  </body>
</html>
